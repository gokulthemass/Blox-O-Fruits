
<section class="bg-black min-h-screen p-4 sm:p-6 md:p-8">

  <div class="max-w-[950px] mx-auto">

    <!-- Search Bar -->
    <div class="mb-8 flex justify-center">
      <input
        type="text"
        [(ngModel)]="searchText"
        placeholder="Search Sea Events..."
        class="w-full px-5 py-3 bg-[#111] border border-gray-700 rounded-xl text-white outline-none focus:border-violet-500"
      />
    </div>

    <!-- Sea Event Cards -->
    <div class="flex flex-wrap justify-center gap-5">

      <div
        *ngFor="let event of filteredSeaEvents()" 
        (click)="openDetails(event)"
        class="relative
               w-full
               sm:w-[280px]
               md:w-[290px]
               bg-[#0a0a0a]
               border border-gray-800
               rounded-2xl
               overflow-hidden
               hover:border-violet-500
               hover:-translate-y-1
               transition-all duration-300
               cursor-pointer"
      >

        <!-- Danger Badge -->
        <div
          class="absolute top-3 right-3 px-4 py-2 rounded-xl text-xs font-bold uppercase text-white"
          [ngClass]="dangerClass(event.danger_level)"
        >
          {{ event.danger_level }}
        </div>

        <!-- Event Image -->
        <div class="flex justify-center pt-8 pb-4">
          <img
            [src]="event.image"
            [alt]="event.name"
            class="w-24 h-24 object-contain"
          />
        </div>

        <!-- Content -->
        <div class="p-4 border-t border-gray-800">

          <h2 class="text-lg font-bold text-white mb-4">
            {{ event.name }}
          </h2>

          <div class="flex justify-between mb-2">
            <span class="text-gray-400">Type</span>
            <span class="text-violet-400 font-semibold">
              {{ event.type }}
            </span>
          </div>

          <div class="flex justify-between mb-2">
            <span class="text-gray-400">Sea</span>
            <span class="text-yellow-400 font-semibold">
              {{ event.location_seas.join(', ') }}
            </span>
          </div>

          <div class="flex justify-between">
            <span class="text-gray-400">Fragments</span>
            <span class="text-green-400 font-semibold">
              {{ event.rewards.fragments }}
            </span>
          </div>

        </div>

      </div>

    </div>

  </div>

</section>
