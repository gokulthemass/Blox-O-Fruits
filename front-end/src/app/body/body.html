<!-- ========================= -->

<!-- HERO SECTION -->

<!-- ========================= -->

<section class="relative min-h-screen overflow-hidden bg-[#140018]">

  <!-- Background Image -->
  <img
    src="assets/data/mainpage_image/main-page-image.png"
    alt="Main Page"
    class="hidden lg:block absolute inset-0 w-full h-full object-cover object-top"
  />

  <!-- Overlay -->
  <div class="hidden lg:block absolute inset-0 bg-black/40"></div>



  <!-- Content -->

  <div

    class="relative z-10 max-w-[1600px] mx-auto
       px-4 sm:px-8 md:px-12 lg:px-20 xl:px-32
       flex flex-col pt-20 lg:pt-28 pb-12"

  >



    <!-- Hero Text -->

    <div
  class="max-w-3xl
         mx-auto lg:mx-0
         text-center lg:text-left"
>



      <div

        class="text-lg sm:text-xl md:text-2xl font-semibold tracking-wider"

      >

        Welcome to,

      </div>



      <div

        class="mt-2

               text-4xl sm:text-5xl md:text-6xl lg:text-7xl xl:text-8xl

               font-extrabold

               bg-gradient-to-r from-violet-400 via-purple-500 to-pink-500

               bg-clip-text text-transparent"

        style="text-shadow: 0 0 30px rgba(143, 8, 233, 0.35);"

      >

        Blox'O'Fruits

      </div>



      <div

        class="mt-4

               text-sm sm:text-base md:text-lg

               leading-relaxed

               text-gray-200

               max-w-xl"

      >

        Making Blox Fruits a little easier, one guide at a time.

        <br />

        Fruits, Values, Guides and More!

      </div>



      <!-- Buttons -->

      <div class="flex flex-wrap justify-center lg:justify-start gap-4 mt-8">

        <a

          routerLink="/fruits"

          class="px-6 py-3 rounded-xl bg-violet-600 hover:bg-violet-700

                 transition-all duration-300 shadow-lg

                 shadow-violet-500/30 hover:scale-105 font-medium"

        >

          Explore Fruits

        </a>



        <a

          routerLink="/calculator"

          class="px-6 py-3 rounded-xl border border-violet-500

                 hover:bg-violet-500/20

                 transition-all duration-300

                 hover:scale-105 font-medium"

        >

          Try Calculator

        </a>

      </div>



    </div>



    <!-- ========================= -->

    <!-- STATS -->

    <!-- ========================= -->

    <div

      class="grid

             grid-cols-2

             sm:grid-cols-3

             lg:grid-cols-5

             gap-4

             mt-12 lg:mt-16"

    >



      <!-- Fruits -->

      <div

        class="min-h-[110px]

               border border-violet-500/50 rounded-2xl

               bg-black/40 backdrop-blur-md

               flex items-center justify-center gap-3 p-4

               hover:border-violet-500 hover:-translate-y-1

               transition-all duration-300"

      >

        <img

          src="assets/data/icons/fruits-icon.png"

          alt="Fruits"

          class="w-10 h-10 sm:w-12 sm:h-12 md:w-14 md:h-14"

        />



        <div>

          <div class="font-bold text-lg sm:text-xl md:text-2xl text-violet-300">

            40+

          </div>

          <div class="text-xs sm:text-sm text-gray-300">

            Fruits

          </div>

        </div>

      </div>



      <!-- Fighting Styles -->

      <div

        class="min-h-[110px]

               border border-violet-500/50 rounded-2xl

               bg-black/40 backdrop-blur-md

               flex items-center justify-center gap-3 p-4

               hover:border-violet-500 hover:-translate-y-1

               transition-all duration-300"

      >

        <img

          src="assets/data/icons/fighting-styles-icon.png"

          alt="Fighting Styles"

          class="w-10 h-10 sm:w-12 sm:h-12 md:w-14 md:h-14"

        />



        <div>

          <div class="font-bold text-lg sm:text-xl md:text-2xl text-violet-300">

            10+

          </div>

          <div class="text-xs sm:text-sm text-gray-300">

            Fighting Styles

          </div>

        </div>

      </div>



      <!-- Swords -->

      <div

        class="min-h-[110px]

               border border-violet-500/50 rounded-2xl

               bg-black/40 backdrop-blur-md

               flex items-center justify-center gap-3 p-4

               hover:border-violet-500 hover:-translate-y-1

               transition-all duration-300"

      >

        <img

          src="assets/data/icons/swords-icon.png"

          alt="Swords"

          class="w-10 h-10 sm:w-12 sm:h-12 md:w-14 md:h-14"

        />



        <div>

          <div class="font-bold text-lg sm:text-xl md:text-2xl text-violet-300">

            40+

          </div>

          <div class="text-xs sm:text-sm text-gray-300">

            Swords

          </div>

        </div>

      </div>



      <!-- Sea Events -->

      <div

        class="min-h-[110px]

               border border-violet-500/50 rounded-2xl

               bg-black/40 backdrop-blur-md

               flex items-center justify-center gap-3 p-4

               hover:border-violet-500 hover:-translate-y-1

               transition-all duration-300"

      >

        <img

          src="assets/data/icons/sea-events-icon.png"

          alt="Sea Events"

          class="w-10 h-10 sm:w-12 sm:h-12 md:w-14 md:h-14"

        />



        <div>

          <div class="font-bold text-lg sm:text-xl md:text-2xl text-violet-300">

            10+

          </div>

          <div class="text-xs sm:text-sm text-gray-300">

            Sea Events

          </div>

        </div>

      </div>



      <!-- Bosses -->

      <div

        class="min-h-[110px]

               border border-violet-500/50 rounded-2xl

               bg-black/40 backdrop-blur-md

               flex items-center justify-center gap-3 p-4

               hover:border-violet-500 hover:-translate-y-1

               transition-all duration-300"

      >

        <img

          src="assets/data/icons/bosses-icon.png"

          alt="Bosses"

          class="w-10 h-10 sm:w-12 sm:h-12 md:w-14 md:h-14"

        />



        <div>

          <div class="font-bold text-lg sm:text-xl md:text-2xl text-violet-300">

            50+

          </div>

          <div class="text-xs sm:text-sm text-gray-300">

            Bosses

          </div>

        </div>

      </div>



    </div>



  </div>

<div class="h-px w-full bg-violet-500/30"></div>

</section>



<!-- ========================= -->

<!-- FEATURED FRUITS -->

<!-- ========================= -->

<section class="max-w-[1600px] mx-auto px-4 sm:px-6 lg:px-8 py-16 bg-[#140018]">



  <div

    class="text-3xl md:text-4xl font-bold text-center mb-10

           bg-gradient-to-r from-violet-400 to-pink-500

           bg-clip-text text-transparent"

  >

    Featured Fruits

  </div>



  <div

    class="grid

           grid-cols-2

           sm:grid-cols-3

           md:grid-cols-4

           lg:grid-cols-5

           xl:grid-cols-6

           gap-4 md:gap-6"

  >



    <div

      *ngFor="let fruit of FruitArray"

      (click)="openDetail(fruit)"

      class="border-2 border-violet-600 rounded-2xl

             p-4 flex flex-col items-center justify-center

             bg-black/40 backdrop-blur-sm

             hover:scale-105 hover:shadow-lg

             hover:shadow-violet-600/30

             transition-all duration-300 cursor-pointer"

    >



      <img

        [src]="fruit.image"

        [alt]="fruit.name"

        class="w-24 h-24

               sm:w-28 sm:h-28

               md:w-32 md:h-32

               lg:w-36 lg:h-36

               object-contain"

      />



      <p

        class="mt-3 text-center font-semibold text-white

               text-sm md:text-base"

      >

        {{ fruit.name }}

      </p>



    </div>



  </div>



</section>
